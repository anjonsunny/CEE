name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  blocking:
    name: blocking gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-xdist
      - name: Run BLOCKING tests
        run: pytest -c tests/pytest.ini tests/ -m blocking -n auto --tb=short

  warn:
    name: warn advisory
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-xdist
      - name: Run WARN tests (advisory; failure does not gate)
        run: pytest -c tests/pytest.ini tests/ -m warn -n auto --tb=short

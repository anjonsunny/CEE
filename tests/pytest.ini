[pytest]
# CEE+ test suite configuration.
# Severity markers (every test gets exactly one):
#   blocking — must pass; CI gates on these
#   warn     — should pass; CI posts comment on fail
#   human    — manual; CI skips with reason
# Dependency markers (optional):
#   needs_qwen     — requires live Qwen runtime; skipped unless RUN_QWEN=1
#   needs_fixtures — requires fixtures not yet captured; skipped with reason
markers =
    blocking: must-pass tests; CI gate
    warn: should-pass tests; non-blocking
    human: manual-only test (kept here as documentation)
    needs_qwen: requires a live Qwen/Ollama runtime
    needs_fixtures: requires fixtures not yet captured
testpaths = .
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning
